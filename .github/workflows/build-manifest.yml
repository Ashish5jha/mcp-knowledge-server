name: Build Knowledge Manifests

on:
  push:
    branches:
      - main
    paths:
      - "knowledge-base/**"

  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write # needed to commit the generated manifest.json files

jobs:
  build-manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install gray-matter
        run: npm install --prefix scripts gray-matter

      - name: Build all manifests
        run: node scripts/build-manifest.js --all

      - name: Commit updated manifests
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: rebuild knowledge manifests [skip ci]"
          file_pattern: "knowledge-base/**/manifest.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
